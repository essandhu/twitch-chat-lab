# fly.toml app configuration file generated for twitch-chat-lab-proxy on 2026-04-18T00:41:52-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'twitch-chat-lab-proxy'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  # Pinned to a single machine: the session registry in
  # internal/aggregator/registry.go is per-process, so POST /session and the
  # follow-up GET /ws/:id must land on the same instance. Before raising this,
  # add fly-replay routing (embed $FLY_MACHINE_ID in the session id, have the
  # /ws handler emit `fly-replay: instance=<id>` when it doesn't match).
  min_machines_running = 1
  max_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
